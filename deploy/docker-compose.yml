services:
  backend:
    build:
      context: ../backend
    container_name: elderly-companion-backend
    environment:
      - PORT=3000
    restart: unless-stopped

  web:
    build:
      context: ../frontend
    container_name: elderly-companion-web
    restart: unless-stopped
    depends_on:
      - backend

  gateway:
    image: nginx:1.27-alpine
    container_name: elderly-companion-gateway
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_PORT:-80}:80"
    restart: unless-stopped
    depends_on:
      - web
      - backend

